name: 🚀 AgentRoot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  welcome:
    name: 👋 Welcome Contributor
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'joecapella'
    steps:
      - name: Post welcome comment
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            🎉 **Welcome to AgentRoot!**  
            Thanks for your first PR. You're helping build the future of private AI coworking.  
            We'll review this as fast as possible.  
            Questions? Join the discussion: https://github.com/joecapella/agentroot/discussions

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check (tsc)
        run: npx tsc --noEmit

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up database
        run: npx prisma migrate deploy || true
        env:
          DATABASE_URL: file:./test.db

      - name: Run tests
        run: npm test -- --coverage
        env:
          DATABASE_URL: file:./test.db

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: matrix.node-version == '20.x'
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true

  python-lint:
    name: Python Lint (Agents)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f src/CofounderAgent/requirements.txt ]; then
            pip install -r src/CofounderAgent/requirements.txt
          fi
          if [ -f src/CalculatorAgent/requirements.txt ]; then
            pip install -r src/CalculatorAgent/requirements.txt
          fi
          pip install pylint black

      - name: Run Black formatter check
        run: black --check src/ || true

      - name: Run Pylint
        run: pylint src/CofounderAgent src/CalculatorAgent --disable=all --enable=E,F || true
