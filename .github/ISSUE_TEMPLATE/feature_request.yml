name: 💡 Feature Request / Idea
description: Shape the future of open-source AI coworking
title: "[FEATURE] "
labels: ["enhancement", "good first issue"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Help us understand what you'd like to build.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Or what user need does it address?
      placeholder: |
        Users currently have to [manual workaround]. It would be better if [desired behavior].
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Any wireframes, mockups, or code examples?
      placeholder: |
        I propose adding [feature] that would allow [use case].
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there other ways to solve this?
      placeholder: |
        - Option A: [description]
        - Option B: [description]

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other info? Links, references, examples?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for similar requests
          required: true
        - label: This feature aligns with the project scope
          required: false
