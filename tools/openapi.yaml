openapi: 3.1.0
info:
  title: CofounderAgent Tool Service
  version: 0.4.0
  description: |
    OpenAPI surface for tools exposed to the CofounderAgent ReAct loop and
    optionally to external orchestrators (MCP, other agents). Mirrors the
    OpenAI-style function schemas in `src/server/toolsSchema.ts` and the
    Python `@tool` decorators in `src/CofounderAgent/main.py`.

    Authentication: local-only mode. Endpoints do not require login,
    sessions, bearer tokens, or CSRF headers. Ownership is derived from the
    server-side local principal and checked where a conversation/task id is
    provided.

    Approval gating: tools tagged `destructive` (`write_file`,
    `search_replace`, `run_command`, `generate_image`) create an `Approval`
    row when `toolsMode != "allowed"`. The loop polls until the user
    resolves the approval, then re-executes the tool.

    Rollback: every successful `write_file` / `search_replace` snapshots the
    pre-change content into `/tmp/cofounder_rollback_*` and writes a
    `RollbackSnapshot` DB row. Snapshots older than 14 days are sweepable via
    `DELETE /api/rollback`.
servers:
  - url: http://127.0.0.1:3000
    description: Local Next.js backend (loopback only by default).

tags:
  - name: filesystem
  - name: shell
  - name: search
  - name: web
  - name: git
  - name: image
  - name: ui
  - name: planning
  - name: meta

paths:
  # ── filesystem ─────────────────────────────────────────────────────────
  /api/tools/execute:
    post:
      operationId: executeTool
      summary: Generic tool dispatcher (proxies into the ReAct executor).
      description: |
        Single entrypoint that routes to read_file / list_directory /
        write_file / search_replace / run_command / grep / fetch_url /
        git_status / git_diff. Used by the chat loop. Direct callers should
        prefer the specific endpoints below for clearer audit trails.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolCall"
      responses:
        "200":
          description: ToolResult
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ToolResult" }

  # ── UI-facing low-risk tools (legacy v1 surface) ─────────────────────
  /api/tools/open_url:
    post:
      operationId: open_url
      tags: [ui]
      summary: Propose opening a URL — creates an AWAITING_APPROVAL Task.
      description: |
        Validates the URL (http(s) only) and creates a Task with status
        `AWAITING_APPROVAL`. **Does not open anything.** A separate approve
        call is required to actually invoke the host browser.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string, format: uri }
                conversationId: { type: string, nullable: true }
              required: [url]
      responses:
        "200": { description: AWAITING_APPROVAL task created }
        "400": { description: invalid URL }

  /api/tools/open_url/approve/{taskId}:
    post:
      operationId: approve_open_url
      tags: [ui]
      summary: Approve & execute a previously-proposed open_url task.
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: URL opened via platform opener }
        "409": { description: already resolved }

  /api/tools/create_todo:
    post:
      operationId: create_todo
      tags: [ui]
      summary: Create a Task row scoped to the calling user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                summary: { type: string, maxLength: 500 }
                conversationId: { type: string, nullable: true }
              required: [summary]
      responses:
        "200": { description: Task row created }

  # ── approvals & rollback ──────────────────────────────────────────────
  /api/approvals:
    get:
      operationId: list_approvals
      tags: [meta]
      summary: List pending approvals for the current user.
      responses: { "200": { description: ok } }

  /api/approvals/{id}:
    post:
      operationId: resolve_approval
      tags: [meta]
      summary: Approve or reject a pending tool execution.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                decision: { type: string, enum: [approved, rejected] }
              required: [decision]
      responses:
        "200": { description: resolved }
        "409": { description: already resolved }

  /api/rollback:
    get:
      operationId: list_rollback_snapshots
      tags: [meta]
      summary: List rollback snapshots (most recent first).
      responses: { "200": { description: ok } }
    post:
      operationId: restore_rollback
      tags: [meta]
      summary: Restore the repo to a previously-captured snapshot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                snapshotDir: { type: string }
              required: [snapshotDir]
      responses: { "200": { description: restored } }
    delete:
      operationId: sweep_rollback_snapshots
      tags: [meta]
      summary: Remove rollback snapshots older than the TTL (14 days).
      responses: { "200": { description: swept } }

  # ── planning ──────────────────────────────────────────────────────────
  /api/plans:
    get:
      operationId: list_plans
      tags: [planning]
      responses: { "200": { description: ok } }
    post:
      operationId: create_plan
      tags: [planning]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                conversationId: { type: string, nullable: true }
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      description: { type: string }
                      toolName: { type: string, nullable: true }
                      toolParams: { type: object, additionalProperties: true }
                    required: [description]
              required: [title, steps]
      responses: { "200": { description: created } }

  # ── files autocomplete (powers @-mention in chat input) ──────────────
  /api/files/search:
    get:
      operationId: search_files
      tags: [search]
      summary: Fuzzy file path search for the @-mention UI. Read-only.
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: matches
          content:
            application/json:
              schema:
                type: object
                properties:
                  matches:
                    type: array
                    items: { type: string }

components:
  schemas:
    ToolCall:
      type: object
      properties:
        name:
          type: string
          enum:
            - read_file
            - list_directory
            - write_file
            - search_replace
            - run_command
            - grep
            - fetch_url
            - generate_image
            - git_status
            - git_diff
            - git_log
            - git_branch
            - git_show
            - add
            - multiply
        arguments:
          type: object
          additionalProperties: true
        call_id: { type: string }
      required: [name, arguments]

    ToolResult:
      type: object
      properties:
        call_id: { type: string }
        name: { type: string }
        output: { type: string }
        status:
          type: string
          enum: [ok, error, awaiting_approval]
        approvalId: { type: string, nullable: true }
        diff: { type: string, nullable: true }
        rollbackDir: { type: string, nullable: true }
      required: [name, output, status]
