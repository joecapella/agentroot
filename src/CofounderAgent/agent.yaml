# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: CofounderAgent
description: |
  Joseph's personal cofounder assistant. Orchestrator agent that adopts one of
  several personas (orchestrator | code_assistant | brand_designer | ops | vision)
  based on the requested task kind. Routes between deployed Foundry models.
metadata:
    authors:
        - jthomas
    example:
        - role: user
          content: Plan my next two hours of PLIMSOLL work.
    tags:
        - cofounder
        - orchestrator
        - personal
protocols:
    - protocol: responses
      version: v1
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_OPENAI_ENDPOINT
      value: ${AZURE_OPENAI_ENDPOINT}
    - name: OPENAI_API_VERSION
      value: 2025-03-01-preview
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5.5
